<div class="page">

  <div class="card">

    <div class="header">
      <h1>Registro de Componente</h1>
      <p>Ingrese las especificaciones técnicas del hardware</p>
    </div>

    <form>

      <div class="row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Ej: Intel Core i7 12700K">
        </div>

        <div class="form-group">
          <label>Tipo</label>
          <select>
            <option>Procesador</option>
            <option>Tarjeta gráfica</option>
            <option>Memoria RAM</option>
            <option>Almacenamiento</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Marca</label>
          <input type="text" placeholder="Intel, AMD, Nvidia">
        </div>

        <div class="form-group">
          <label>Precio</label>
          <input type="number" placeholder="$ 0.00">
        </div>
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea rows="3" placeholder="Detalles técnicos del componente"></textarea>
      </div>

      <div class="form-group">
        <label>Stock</label>
        <input type="number" placeholder="Cantidad disponible">
      </div>

      <button type="submit" class="btn-primary">
        Guardar componente
      </button>

    </form>

  </div>

</div>
